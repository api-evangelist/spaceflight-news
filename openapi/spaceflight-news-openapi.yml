components:
  parameters:
    event:
      in: query
      name: event
      description: Search for all documents related to a specific event using its Launch Library 2 ID.
      schema:
        type: array
        items:
          type: integer
      explode: false
      style: form
      example: [42]
    has_event:
      in: query
      name: has_event
      description: Get all documents that have a related event.
      schema:
        type: boolean
      example: true
    has_launch:
      in: query
      name: has_launch
      description: Get all documents that have a related launch.
      schema:
        type: boolean
      example: true
    is_featured:
      in: query
      name: is_featured
      description: Get all documents that are featured.
      schema:
        type: boolean
      example: true
    launch:
      in: query
      name: launch
      description: Search for all documents related to a specific launch using its Launch Library 2 UUID.
      schema:
        type: array
        items:
          type: string
          format: uuid
      explode: false
      style: form
      example: ["f33d5ece-e825-4cd8-809f-1d4c72a2e0d3"]
    limit:
      in: query
      name: limit
      required: false
      description: Number of results to return per page.
      schema:
        type: integer
      example: 10
    news_site:
      in: query
      name: news_site
      description: Search for documents with a news_site name present in a list of comma-separated values. Case insensitive.
      schema:
        type: string
      example: SpaceX,NASA
    news_site_exclude:
      in: query
      name: news_site_exclude
      description: Search for documents with a news_site name NOT present in a list of comma-separated values. Case insensitive.
      schema:
        type: string
      example: TechCrunch
    offset:
      in: query
      name: offset
      required: false
      description: The initial index from which to return the results.
      schema:
        type: integer
      example: 0
    ordering:
      in: query
      name: ordering
      description: |-
        Order the result on `published_at, -published_at, updated_at, -updated_at`.

        * `published_at` - Published at
        * `-published_at` - Published at (descending)
        * `updated_at` - Updated at
        * `-updated_at` - Updated at (descending)
      schema:
        type: array
        items:
          type: string
          enum:
            - -published_at
            - -updated_at
            - published_at
            - updated_at
      explode: false
      style: form
      example: ["-published_at"]
    published_at_gt:
      in: query
      name: published_at_gt
      description: Get all documents published after a given ISO8601 timestamp (excluded).
      schema:
        type: string
        format: date-time
      example: '2025-01-01T00:00:00Z'
    published_at_gte:
      in: query
      name: published_at_gte
      description: Get all documents published after a given ISO8601 timestamp (included).
      schema:
        type: string
        format: date-time
      example: '2025-01-01T00:00:00Z'
    published_at_lt:
      in: query
      name: published_at_lt
      description: Get all documents published before a given ISO8601 timestamp (excluded).
      schema:
        type: string
        format: date-time
      example: '2026-12-31T23:59:59Z'
    published_at_lte:
      in: query
      name: published_at_lte
      description: Get all documents published before a given ISO8601 timestamp (included).
      schema:
        type: string
        format: date-time
      example: '2026-12-31T23:59:59Z'
    search:
      in: query
      name: search
      required: false
      description: Search for documents with a specific phrase in the title or summary.
      schema:
        type: string
      example: Starship
    summary_contains:
      in: query
      name: summary_contains
      description: Search for all documents with a specific phrase in the summary.
      schema:
        type: string
      example: Falcon 9
    summary_contains_all:
      in: query
      name: summary_contains_all
      description: Search for documents with a summary containing all keywords from comma-separated values.
      schema:
        type: string
      example: Starship,booster
    summary_contains_one:
      in: query
      name: summary_contains_one
      description: Search for documents with a summary containing at least one keyword from comma-separated values.
      schema:
        type: string
      example: Falcon,Starship,Dragon
    title_contains:
      in: query
      name: title_contains
      description: Search for all documents with a specific phrase in the title.
      schema:
        type: string
      example: SpaceX
    title_contains_all:
      in: query
      name: title_contains_all
      description: Search for documents with a title containing all keywords from comma-separated values.
      schema:
        type: string
      example: Starlink,launch
    title_contains_one:
      in: query
      name: title_contains_one
      description: Search for documents with a title containing at least one keyword from comma-separated values.
      schema:
        type: string
      example: SpaceX,Blue Origin
    updated_at_gt:
      in: query
      name: updated_at_gt
      description: Get all documents updated after a given ISO8601 timestamp (excluded).
      schema:
        type: string
        format: date-time
      example: '2025-01-01T00:00:00Z'
    updated_at_gte:
      in: query
      name: updated_at_gte
      description: Get all documents updated after a given ISO8601 timestamp (included).
      schema:
        type: string
        format: date-time
      example: '2025-01-01T00:00:00Z'
    updated_at_lt:
      in: query
      name: updated_at_lt
      description: Get all documents updated before a given ISO8601 timestamp (excluded).
      schema:
        type: string
        format: date-time
      example: '2026-12-31T23:59:59Z'
    updated_at_lte:
      in: query
      name: updated_at_lte
      description: Get all documents updated before a given ISO8601 timestamp (included).
      schema:
        type: string
        format: date-time
      example: '2026-12-31T23:59:59Z'
  schemas:
    Article:
      type: object
      description: A spaceflight news article aggregated from a participating publisher.
      properties:
        id:
          type: integer
          readOnly: true
          description: Unique identifier of the article.
          example: 38168
        title:
          type: string
          maxLength: 250
          description: Title of the article.
          example: 'Live coverage: SpaceX to launch 50th Starlink mission of 2026'
        authors:
          type: array
          description: List of authors who contributed to the article.
          items:
            $ref: '#/components/schemas/Author'
        url:
          type: string
          format: uri
          maxLength: 200
          description: Canonical URL of the article on the source publisher.
          example: https://spaceflightnow.com/2026/05/30/live-coverage-spacex-starlink/
        image_url:
          type: string
          format: uri
          maxLength: 500
          description: URL to a cover/header image for the article.
          example: https://spaceflightnow.com/wp-content/uploads/2025/09/Starlink_Vertical.jpg
        news_site:
          type: string
          readOnly: true
          description: Display name of the publisher that produced the article.
          example: Spaceflight Now
        summary:
          type: string
          description: Short summary of the article body.
          example: The Starlink 17-41 mission is SpaceX's 10th and final launch of May.
        published_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the article was originally published.
          example: '2026-05-30T13:46:18Z'
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: ISO 8601 timestamp when the article was last updated in SNAPI.
          example: '2026-05-30T13:50:17.306479Z'
        featured:
          type: boolean
          description: Whether the article is featured (curated by SNAPI editors).
          example: false
        launches:
          type: array
          description: Related Launch Library 2 launches.
          items:
            $ref: '#/components/schemas/Launch'
        events:
          type: array
          description: Related Launch Library 2 events.
          items:
            $ref: '#/components/schemas/Event'
      required:
        - authors
        - events
        - id
        - image_url
        - launches
        - news_site
        - published_at
        - summary
        - title
        - updated_at
        - url
    Author:
      type: object
      description: Author byline for an article, blog, or report.
      properties:
        name:
          type: string
          maxLength: 250
          description: Display name of the author.
          example: Will Robinson-Smith
        socials:
          $ref: '#/components/schemas/Socials'
      required:
        - name
    Blog:
      type: object
      description: A spaceflight blog post (longform commentary or analysis) from a participating publisher.
      properties:
        id:
          type: integer
          readOnly: true
          description: Unique identifier of the blog post.
          example: 2277
        title:
          type: string
          maxLength: 250
          description: Title of the blog post.
          example: United Launch Alliance Precisely Delivers Seventh Amazon Leo Mission
        authors:
          type: array
          description: List of authors who contributed to the blog post.
          items:
            $ref: '#/components/schemas/Author'
        url:
          type: string
          format: uri
          maxLength: 200
          description: Canonical URL of the blog post on the source publisher.
          example: https://blog.ulalaunch.com/blog/seventh-amazon-leo-mission
        image_url:
          type: string
          format: uri
          maxLength: 500
          description: URL to a cover/header image for the blog post.
          example: https://blog.ulalaunch.com/hubfs/av_leo7_l4_media.jpg
        news_site:
          type: string
          readOnly: true
          description: Display name of the publisher.
          example: United Launch Alliance
        summary:
          type: string
          description: Short summary of the blog post.
          example: ULA has launched the majority of Amazon Leo satellites on orbit.
        published_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the blog post was originally published.
          example: '2026-05-30T01:40:06Z'
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: ISO 8601 timestamp when the blog post was last updated in SNAPI.
          example: '2026-05-30T01:50:20.401325Z'
        featured:
          type: boolean
          description: Whether the blog post is featured.
          example: false
        launches:
          type: array
          description: Related Launch Library 2 launches.
          items:
            $ref: '#/components/schemas/Launch'
        events:
          type: array
          description: Related Launch Library 2 events.
          items:
            $ref: '#/components/schemas/Event'
      required:
        - authors
        - events
        - id
        - image_url
        - launches
        - news_site
        - published_at
        - summary
        - title
        - updated_at
        - url
    Event:
      type: object
      description: Relationship to a Launch Library 2 event (e.g. EVA, docking, milestone).
      properties:
        event_id:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          description: Launch Library 2 event identifier.
          example: 851
        provider:
          type: string
          readOnly: true
          description: Source provider of the related event (typically Launch Library 2).
          example: Launch Library 2
      required:
        - event_id
        - provider
    Info:
      type: object
      description: API metadata describing the running SNAPI version and the news sites currently aggregated.
      properties:
        version:
          type: string
          description: Current SNAPI version string.
          example: 4.30.2
        news_sites:
          type: array
          description: List of news site names currently imported by SNAPI.
          items:
            type: string
          example:
            - NASA
            - SpaceX
            - ESA
            - Spaceflight Now
      required:
        - news_sites
        - version
    Launch:
      type: object
      description: Relationship to a Launch Library 2 launch.
      properties:
        launch_id:
          type: string
          format: uuid
          description: Launch Library 2 launch UUID.
          example: f33d5ece-e825-4cd8-809f-1d4c72a2e0d3
        provider:
          type: string
          readOnly: true
          description: Source provider of the related launch (typically Launch Library 2).
          example: Launch Library 2
      required:
        - launch_id
        - provider
    PaginatedArticleList:
      type: object
      description: Paginated envelope wrapping a page of articles.
      required:
        - count
        - results
      properties:
        count:
          type: integer
          description: Total number of articles matching the query.
          example: 34380
        next:
          type: string
          nullable: true
          format: uri
          description: URL to fetch the next page of results, or null on the last page.
          example: https://api.spaceflightnewsapi.net/v4/articles/?limit=10&offset=20
        previous:
          type: string
          nullable: true
          format: uri
          description: URL to fetch the previous page of results, or null on the first page.
          example: https://api.spaceflightnewsapi.net/v4/articles/?limit=10&offset=0
        results:
          type: array
          description: The current page of articles.
          items:
            $ref: '#/components/schemas/Article'
    PaginatedBlogList:
      type: object
      description: Paginated envelope wrapping a page of blog posts.
      required:
        - count
        - results
      properties:
        count:
          type: integer
          description: Total number of blog posts matching the query.
          example: 1995
        next:
          type: string
          nullable: true
          format: uri
          description: URL to fetch the next page of results, or null on the last page.
          example: https://api.spaceflightnewsapi.net/v4/blogs/?limit=10&offset=20
        previous:
          type: string
          nullable: true
          format: uri
          description: URL to fetch the previous page of results, or null on the first page.
          example: https://api.spaceflightnewsapi.net/v4/blogs/?limit=10&offset=0
        results:
          type: array
          description: The current page of blog posts.
          items:
            $ref: '#/components/schemas/Blog'
    PaginatedReportList:
      type: object
      description: Paginated envelope wrapping a page of reports.
      required:
        - count
        - results
      properties:
        count:
          type: integer
          description: Total number of reports matching the query.
          example: 1415
        next:
          type: string
          nullable: true
          format: uri
          description: URL to fetch the next page of results, or null on the last page.
          example: https://api.spaceflightnewsapi.net/v4/reports/?limit=10&offset=20
        previous:
          type: string
          nullable: true
          format: uri
          description: URL to fetch the previous page of results, or null on the first page.
          example: https://api.spaceflightnewsapi.net/v4/reports/?limit=10&offset=0
        results:
          type: array
          description: The current page of reports.
          items:
            $ref: '#/components/schemas/Report'
    Report:
      type: object
      description: A spaceflight report (mission report, program update, or agency briefing) from a participating publisher.
      properties:
        id:
          type: integer
          readOnly: true
          description: Unique identifier of the report.
          example: 1662
        title:
          type: string
          maxLength: 250
          description: Title of the report.
          example: Starliner arrives safely back on Earth
        authors:
          type: array
          description: List of authors who contributed to the report.
          items:
            $ref: '#/components/schemas/Author'
        url:
          type: string
          format: uri
          maxLength: 200
          description: Canonical URL of the report on the source publisher.
          example: https://starlinerupdates.com/starliner-arrives-safely-back-on-earth/
        image_url:
          type: string
          format: uri
          maxLength: 200
          description: URL to a cover/header image for the report.
          example: https://boeing-jtti.s3.amazonaws.com/wp-content/uploads/2023/02/docking.png
        news_site:
          type: string
          readOnly: true
          description: Display name of the publisher that produced the report.
          example: Boeing
        summary:
          type: string
          description: Short summary of the report.
          example: Boeing's Starliner landed safely at 12:01 a.m. Eastern time on Saturday.
        published_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the report was originally published.
          example: '2024-09-07T04:14:32Z'
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: ISO 8601 timestamp when the report was last updated in SNAPI.
          example: '2024-09-07T04:18:06.656360Z'
      required:
        - authors
        - id
        - image_url
        - news_site
        - published_at
        - title
        - updated_at
        - url
    Socials:
      type: object
      description: Social media handles for an author.
      properties:
        x:
          type: string
          format: uri
          maxLength: 200
          description: URL of the author's X (Twitter) profile.
          example: https://x.com/willrobinsons
        youtube:
          type: string
          format: uri
          maxLength: 200
          description: URL of the author's YouTube channel.
          example: https://youtube.com/@author
        instagram:
          type: string
          format: uri
          maxLength: 200
          description: URL of the author's Instagram profile.
          example: https://instagram.com/author
        linkedin:
          type: string
          format: uri
          maxLength: 200
          description: URL of the author's LinkedIn profile.
          example: https://linkedin.com/in/author
        mastodon:
          type: string
          format: uri
          maxLength: 200
          description: URL of the author's Mastodon profile.
          example: https://mastodon.social/@author
        bluesky:
          type: string
          format: uri
          maxLength: 200
          description: URL of the author's Bluesky profile.
          example: https://bsky.app/profile/author.bsky.social
