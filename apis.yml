  - name: Launch Library 2 API
    description: >-
      Sister API by The Space Devs, used by SNAPI to relate news articles to
      specific launches and events. Provides upcoming/previous launch data,
      events, agencies, astronauts, expeditions, spacecraft, launchers, and
      pads. SNAPI articles, blogs, and reports can be filtered by `launch` (UUID)
      or `event` (LL2 ID).
    humanURL: https://thespacedevs.com/llapi
