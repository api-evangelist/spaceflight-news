apis:
  - name: Spaceflight News API v4
    description: >-
      REST API providing access to aggregated spaceflight news articles, blog
      posts, and official mission reports from 40+ news sites. Supports rich
      filtering (full-text search, news-site filters, date ranges, related
      Launch Library 2 launches/events), pagination, and ordering. A companion
      GraphQL endpoint is also exposed at /v4/graphql/.
    humanURL: https://spaceflightnewsapi.net
