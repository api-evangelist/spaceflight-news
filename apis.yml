aid: spaceflight-news
name: Spaceflight News
description: >-
  The Spaceflight News API (SNAPI) by The Space Devs (TSD) is the most complete
  and up-to-date open spaceflight news API. It aggregates articles, blogs, and
  reports from 40+ news sites (NASA, ESA, SpaceX, Spaceflight Now, SpaceNews,
  Ars Technica, Reuters, and more) and exposes them through a public REST API
  (and a GraphQL endpoint). The project is open source under AGPL-3.0, runs on
  community Patreon funding, and is integrated with the Launch Library 2 API so
  any article can be linked to a specific launch or event.
url: https://spaceflightnewsapi.net
